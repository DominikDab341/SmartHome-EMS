services:
  db:
    image: postgres:15-alpine
    container_name: zzpo_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: zzpo_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: zzpo_backend
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_HOST=db
    volumes:
      - ./backend:/app
      - /app/.venv
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: zzpo_frontend
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
