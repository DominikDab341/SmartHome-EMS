services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: smarthome
      POSTGRES_PASSWORD: password
      POSTGRES_DB: smarthome_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://smarthome:password@db:5432/smarthome_db
      - SECRET_KEY=dev-compose-secret
      - SIMULATION_INTERVAL_SECONDS=60
      - WATCHFILES_FORCE_POLLING=true
    depends_on:
      - db
    volumes:
      - ./backend:/app

volumes:
  postgres_data:
